.ni{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:6px;cursor:pointer;color:#666;font-size:12px;margin:1px 5px;transition:background .12s;user-select:none}

async function initFirebase(){
  const {initializeApp} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const {getFirestore,doc,getDoc,setDoc} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');

  db = getFirestore(app);

}

async function ld(k){
  try{
    const d = await window._fsGet(window._fsDoc(db,'graficapro',k));
    return d.exists() ? d.data().value : null;
  }catch(e){console.warn('ld error',k,e);return null;}
}
async function sv(k,v){
  try{

// ---- HELPERS ----
const $m=n=>'$'+Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0});
function cNom(id){const c=S.clientes.find(x=>x.id==id);return c?c.nombre:'-';}
function pNom(id){if(!id)return'—';const p=S.proveedores.find(x=>x.id==id);return p?p.nombre:'—';}
function alfa(a){return[...a].sort((x,y)=>x.nombre.localeCompare(y.nombre,'es',{sensitivity:'base'}));}
function esc(q){return q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function hl(txt,q){if(!q||!txt)return txt||'';return txt.replace(new RegExp('('+esc(q)+')','gi'),'<mark>$1</mark>');}
function ivaBadge(v){const m={RI:'bi',MT:'ba',EX:'bt',CF:'bgr'};const l={RI:'R.Inscripto',MT:'Monotributista',EX:'Exento',CF:'Cons.Final'};return v?`<span class="badge ${m[v]||'bgr'}">${l[v]||v}</span>`:''}
function stBadge(e){
  const m={borrador:'bgr',enviada:'bi',aprobada:'bg2',rechazada:'br',pendiente:'ba',en_produccion:'bi',externo:'bp2',lista:'bt',entregada:'bg2',cancelada:'br',emitida:'bi',pagada:'bg2',emitido:'bi',entregado:'bg2',activa:'bg2'};
  const l={borrador:'Borrador',enviada:'Enviada',aprobada:'Aprobada',rechazada:'Rechazada',pendiente:'Pendiente',en_produccion:'En producción',externo:'En externo',lista:'Lista',entregada:'Entregada',cancelada:'Cancelada',emitida:'Emitida',pagada:'Pagada',emitido:'Emitido',entregado:'Entregado',activa:'Activa'};
  return `<span class="badge ${m[e]||'bgr'}">${l[e]||e}</span>`;
}
const OT_COLORS=['c0','c1','c2','c3','c4','c5','c6','c7'];
function otCol(id){return OT_COLORS[(id-1)%OT_COLORS.length];}

function searchCli(v){bCli=v;pCli=1;updateCliTable();}

function updateCliTable(){
  const f=bCli.trim().toLowerCase();
  const sorted=alfa(S.clientes);
  const rows=f?sorted.filter(c=>c.nombre.toLowerCase().includes(f)||(c.cuit||'').includes(f)||(c.email||'').toLowerCase().includes(f)||(c.loc||'').toLowerCase().includes(f)):sorted;
  const tot=rows.length,pgs=Math.ceil(tot/PER)||1;
  if(pCli>pgs)pCli=1;
  const sl=rows.slice((pCli-1)*PER,pCli*PER);
  const sub=Q('cli-sub');if(sub)sub.textContent=`${tot} resultado${tot!==1?'s':''} de ${S.clientes.length}`;
  const hint=Q('cli-hint');
  if(hint)hint.innerHTML=f?`<i class="ti ti-info-circle"></i> ${rows.length} coincidencia${rows.length!==1?'s':''} · <a href="#" onclick="bCli='';Q('sci').value='';updateCliTable();return false" style="color:#185fa5">limpiar</a>`:'Ordenado A→Z · Escribí para filtrar';
  let trs='';
  if(!f){let ll='';for(const c of sl){const l=(c.nombre[0]||'#').toUpperCase();if(l!==ll){trs+=`<tr><td colspan="5" class="sep">${l}</td></tr>`;ll=l;}trs+=`<tr><td><strong style="font-weight:500">${c.nombre}</strong></td><td style="font-family:monospace;font-size:11px">${c.cuit||'—'}</td><td>${ivaBadge(c.iva)}</td><td>${c.loc||'—'}</td><td style="white-space:nowrap"><button onclick="om('vc',${c.id})"><i class="ti ti-eye"></i></button><button class="bd" onclick="delCli(${c.id})" title="Eliminar cliente"><i class="ti ti-trash"></i></button></td></tr>`;}}
  else{if(!sl.length)trs=`<tr><td colspan="5"><div class="empty"><i class="ti ti-search"></i>Sin resultados para "${f}"</div></td></tr>`;for(const c of sl)trs+=`<tr><td><strong style="font-weight:500">${hl(c.nombre,f)}</strong></td><td style="font-family:monospace;font-size:11px">${c.cuit||'—'}</td><td>${ivaBadge(c.iva)}</td><td>${hl(c.loc||'—',f)}</td><td style="white-space:nowrap"><button onclick="om('vc',${c.id})"><i class="ti ti-eye"></i></button><button class="bd" onclick="delCli(${c.id})" title="Eliminar cliente"><i class="ti ti-trash"></i></button></td></tr>`;}
  const tbody=Q('cli-tbody');if(tbody)tbody.innerHTML=trs;
  const pagDiv=Q('cli-pag');if(pagDiv)pagDiv.innerHTML=pgs>1?`<span>${(pCli-1)*PER+1}–${Math.min(pCli*PER,tot)} de ${tot}</span><button onclick="pCli=Math.max(1,pCli-1);updateCliTable()" ${pCli===1?'disabled':''}>‹</button><span>${pCli}/${pgs}</span><button onclick="pCli=Math.min(${pgs},pCli+1);updateCliTable()" ${pCli===pgs?'disabled':''}>›</button>`:'';
}

  const tbody=Q('prov-tbody');if(tbody)tbody.innerHTML=trs;

// ---- PAGES ----
function rDash(){
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const fmtD=d=>d?new Date(d+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'}):'—';
  const diasRestantes=ent=>{if(!ent)return null;const d=new Date(ent+'T00:00:00');return Math.round((d-hoy)/(1000*60*60*24));};

  const activas=S.ordenes.filter(o=>o.estado!=='entregada'&&o.estado!=='cancelada');
  const atrasadas=activas.filter(o=>o.entrega&&diasRestantes(o.entrega)<0);
  const urgentes=activas.filter(o=>o.entrega&&diasRestantes(o.entrega)>=0&&diasRestantes(o.entrega)<=3);
  const enProd=activas.filter(o=>o.estado==='en_produccion');
  const pendientes=activas.filter(o=>o.estado==='pendiente');
  const listas=activas.filter(o=>o.estado==='lista');

  let h=`<div class="ph"><div><div class="pt">Panel de control</div><div class="ps">${new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}</div></div></div>`;

  // ALERTAS de atraso
  if(atrasadas.length){
    h+=`<div style="background:#fcebeb;border:1px solid #f7c1c1;border-radius:10px;padding:12px 14px;margin-bottom:12px">`;
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><i class="ti ti-alert-triangle" style="color:#a32d2d;font-size:16px"></i><strong style="color:#a32d2d;font-size:13px">${atrasadas.length} trabajo${atrasadas.length!==1?'s':''} atrasado${atrasadas.length!==1?'s':''}</strong></div>`;
    atrasadas.forEach(o=>{
      const dias=Math.abs(diasRestantes(o.entrega));
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid rgba(163,45,45,.15);cursor:pointer" onclick="om('vot',${o.id})"><div><span style="font-size:12px;font-weight:600">${o.num}</span> <span style="font-size:12px;color:#444">— ${o.descripcion}</span><div style="font-size:11px;color:#888">${cNom(o.clienteId)}</div></div><div style="text-align:right"><span style="background:#f7c1c1;color:#791f1f;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600">${dias} día${dias!==1?'s':''} de atraso</span><div style="font-size:10px;color:#888;margin-top:2px">Entrega: ${fmtD(o.entrega)}</div></div></div>`;
    });
    h+=`</div>`;
  }

  // URGENTES (vencen en 0-3 días)
  if(urgentes.length){
    h+=`<div style="background:#faeeda;border:1px solid #fac775;border-radius:10px;padding:12px 14px;margin-bottom:12px">`;
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><i class="ti ti-clock" style="color:#ba7517;font-size:16px"></i><strong style="color:#ba7517;font-size:13px">${urgentes.length} entrega${urgentes.length!==1?'s':''} próxima${urgentes.length!==1?'s':''} (0–3 días)</strong></div>`;
    urgentes.forEach(o=>{
      const dias=diasRestantes(o.entrega);
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid rgba(186,117,23,.15);cursor:pointer" onclick="om('vot',${o.id})"><div><span style="font-size:12px;font-weight:600">${o.num}</span> <span style="font-size:12px;color:#444">— ${o.descripcion}</span><div style="font-size:11px;color:#888">${cNom(o.clienteId)}</div></div><div style="text-align:right"><span style="background:#fac775;color:#633806;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600">${dias===0?'Hoy':dias===1?'Mañana':dias+' días'}</span><div style="font-size:10px;color:#888;margin-top:2px">Entrega: ${fmtD(o.entrega)}</div></div></div>`;
    });
    h+=`</div>`;
  }

  // MÉTRICAS operativas
  h+=`<div class="cg">
<div class="mc md" style="cursor:pointer" onclick="nav('ot')"><div class="ml"><i class="ti ti-alert-circle" style="font-size:11px"></i> Atrasadas</div><div class="mv" style="color:#a32d2d">${atrasadas.length}</div></div>
<div class="mc mi" style="cursor:pointer" onclick="fOT='en_produccion';nav('ot')"><div class="ml"><i class="ti ti-printer" style="font-size:11px"></i> En producción</div><div class="mv">${enProd.length}</div></div>
<div class="mc mw" style="cursor:pointer" onclick="fOT='pendiente';nav('ot')"><div class="ml"><i class="ti ti-clock" style="font-size:11px"></i> Pendientes</div><div class="mv">${pendientes.length}</div></div>
<div class="mc ms2" style="cursor:pointer" onclick="fOT='lista';nav('ot')"><div class="ml"><i class="ti ti-circle-check" style="font-size:11px"></i> Listas para entregar</div><div class="mv">${listas.length}</div></div>
</div>`;

  // TABLA: trabajos activos ordenados por urgencia
  h+=`<div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:0.5px solid rgba(0,0,0,.08)"><strong>Órdenes activas</strong><button onclick="nav('ot')" style="font-size:11px">Ver todas</button></div>`;
  if(!activas.length){h+=`<div class="empty"><i class="ti ti-clipboard-list"></i>No hay órdenes activas</div>`;}
  else{
    // ordenar: atrasadas primero, luego por días restantes
    const sorted=[...activas].sort((a,b)=>{
      const da=diasRestantes(a.entrega)??999,db=diasRestantes(b.entrega)??999;
      return da-db;
    });
    h+=`<table><thead><tr><th>OT</th><th>Descripción</th><th>Cliente</th><th>Entrega</th><th>Estado</th><th>Avance</th><th></th></tr></thead><tbody>`;
    sorted.forEach(o=>{
      const dias=diasRestantes(o.entrega);
      const dn=o.pasos?o.pasos.filter(p=>p.estado==='done').length:0;
      const pt=o.pasos?o.pasos.length:1;
      const pc=Math.round((dn/pt)*100);
      let entregaCell='—';
      if(o.entrega){
        if(dias<0) entregaCell=`<span style="color:#a32d2d;font-weight:600">${fmtD(o.entrega)}<br><span style="font-size:10px">${Math.abs(dias)}d atraso</span></span>`;
        else if(dias<=3) entregaCell=`<span style="color:#ba7517;font-weight:600">${fmtD(o.entrega)}<br><span style="font-size:10px">${dias===0?'Hoy':dias===1?'Mañana':dias+'d'}</span></span>`;
        else entregaCell=`${fmtD(o.entrega)}<br><span style="font-size:10px;color:#888">${dias}d</span>`;
      }
      h+=`<tr><td><strong>${o.num}</strong></td><td style="max-width:160px">${o.descripcion}</td><td>${cNom(o.clienteId)}</td><td style="white-space:nowrap;font-size:11px">${entregaCell}</td><td>${stBadge(o.estado)}</td><td style="min-width:80px"><div style="background:#f5f5f3;border-radius:3px;height:5px;overflow:hidden;margin-bottom:2px"><div style="height:100%;width:${pc}%;background:${pc===100?'#3b6d11':'#185fa5'};border-radius:3px"></div></div><span style="font-size:10px;color:#888">${dn}/${pt}</span></td><td><button onclick="om('vot',${o.id})"><i class="ti ti-eye"></i></button></td></tr>`;
    });
    h+=`</tbody></table>`;
  }
  h+=`</div>`;

  // Próximas entregas (7 días)
  const prox=activas.filter(o=>o.entrega&&diasRestantes(o.entrega)>=0&&diasRestantes(o.entrega)<=7).sort((a,b)=>diasRestantes(a.entrega)-diasRestantes(b.entrega));
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`;
  h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><strong>Próximas entregas (7 días)</strong></div>`;
  if(!prox.length)h+=`<div class="empty" style="padding:12px"><i class="ti ti-calendar-check"></i>Sin entregas esta semana</div>`;
  prox.forEach(o=>{
    const dias=diasRestantes(o.entrega);
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid rgba(0,0,0,.05);cursor:pointer" onclick="om('vot',${o.id})"><div><div style="font-size:12px;font-weight:500">${o.num} — ${o.descripcion.substring(0,28)}${o.descripcion.length>28?'…':''}</div><div style="font-size:10px;color:#888">${cNom(o.clienteId)}</div></div><span style="background:${dias<=1?'#fac775':dias<=3?'#faeeda':'#eaf3de'};color:${dias<=1?'#633806':dias<=3?'#854d0e':'#27500a'};padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap">${dias===0?'Hoy':dias===1?'Mañana':fmtD(o.entrega)}</span></div>`;
  });
  h+=`</div>`;

  // Fichas recientes
  h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><strong>Fichas recientes</strong><button onclick="nav('ficha')" style="font-size:11px">Ver todas</button></div>`;
  if(!S.fichas.length)h+=`<div class="empty" style="padding:12px"><i class="ti ti-file-description"></i>Sin fichas</div>`;
  S.fichas.slice(-5).reverse().forEach(f=>{h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,.05);cursor:pointer" onclick="fichaTab='ver';fichaVerID=${f.id};nav('ficha')"><div><div style="font-size:12px;font-weight:500">${f.num}<span style="font-weight:400;color:#888"> — ${f.facRazonSocial}</span></div><div style="font-size:10px;color:#aaa">${f.descripcion.substring(0,40)}…</div></div>${stBadge(f.estado)}</div>`;});
  h+=`</div></div>`;

  return h;
}

function rCot(){
  const rows=fCot?S.cotizaciones.filter(c=>c.estado===fCot):S.cotizaciones;
  let h=`<div class="ph"><div><div class="pt">Cotizaciones</div><div class="ps">${S.cotizaciones.length} registradas</div></div><button class="bp" onclick="om('nc2')"><i class="ti ti-plus"></i>Nueva</button></div>`;
  h+=`<div class="tabs">${['','borrador','enviada','aprobada','rechazada'].map(f=>`<button class="tab ${fCot===f?'on':''}" onclick="fCot='${f}';render()">${f||'Todas'}</button>`).join('')}</div>`;
  h+=`<div class="card" style="padding:0"><table><thead><tr><th>Nro.</th><th>Cliente</th><th>Fecha</th><th>Total venta</th><th>Costo</th><th>Margen</th><th>Estado</th><th></th></tr></thead><tbody>`;
  if(!rows.length)h+=`<tr><td colspan="8"><div class="empty"><i class="ti ti-file-invoice"></i>Sin cotizaciones</div></td></tr>`;
  else rows.forEach(c=>{
    const ct=c.costoTotal||0;const mg=c.total>0?((c.total-ct)/c.total*100).toFixed(1):0;
    const hasOT=S.ordenes.find(o=>o.cotId==c.id);
    const realIdx=S.cotizaciones.indexOf(c);
    h+=`<tr><td><a href="#" onclick="omCot(${c.id});return false" style="font-weight:600;color:#185fa5;text-decoration:none">${c.num}</a></td><td>${cNom(c.clienteId)}</td><td>${c.fecha}</td><td>${$m(c.total)}</td><td>${$m(ct)}</td><td style="color:${mg>=20?'#3b6d11':mg>=10?'#ba7517':'#a32d2d'};font-weight:500">${mg}%</td><td>${stBadge(c.estado)}</td><td style="white-space:nowrap">${c.estado==='aprobada'&&!hasOT?`<button class="bs" onclick="genOT(${realIdx},true)"><i class="ti ti-clipboard-plus"></i>OT</button>`:''}<button class="bd" onclick="delCotIdx(${realIdx})" title="Eliminar cotización"><i class="ti ti-trash"></i></button></td></tr>`;
  });
  h+=`</tbody></table></div>`;return h;
}

function rOT(){
  const rows=fOT?S.ordenes.filter(o=>o.estado===fOT):S.ordenes;
  let h=`<div class="ph"><div><div class="pt">Órdenes de trabajo</div><div class="ps">${S.ordenes.length} órdenes</div></div><button class="bp" onclick="om('not')"><i class="ti ti-plus"></i>Nueva OT</button></div>`;
  h+=`<div class="tabs">${['','pendiente','en_produccion','lista','entregada'].map(f=>`<button class="tab ${fOT===f?'on':''}" onclick="fOT='${f}';render()">${f||'Todas'}</button>`).join('')}</div>`;
  if(!rows.length)h+=`<div class="empty"><i class="ti ti-clipboard-list"></i>Sin órdenes</div>`;
  rows.forEach(o=>{
    const dn=o.pasos.filter(p=>p.estado==='done').length;
    const pc=o.pasos.length>0?Math.round((dn/o.pasos.length)*100):0;
    const a=o.asignaciones||{};
    const tags=Object.entries(a).filter(([,v])=>v&&v.nombre).map(([k,v])=>`<span class="rtag ${v.tipo==='maq'?'maq':v.tipo==='fle'?'ext':'ext'}"><i class="ti ti-${v.tipo==='maq'?'tool':v.tipo==='fle'?'truck-delivery':'user'}" style="font-size:9px"></i> ${v.nombre}</span>`).join('');
    h+=`<div class="card"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:9px"><div><div style="font-size:13px;font-weight:500">${o.num} <span style="font-weight:400;color:#888">— ${o.descripcion}</span></div><div style="font-size:11px;color:#888;margin-top:2px">${cNom(o.clienteId)} · Entrega: ${o.entrega||'—'}</div>${tags?`<div style="margin-top:4px">${tags}</div>`:''}</div><div style="display:flex;gap:5px;align-items:center">${stBadge(o.estado)}<button onclick="om('vot',${o.id})"><i class="ti ti-eye"></i></button><button onclick="om('asgn',${o.id})" style="font-size:11px"><i class="ti ti-cpu"></i>Asignar</button><button class="bd" onclick="delOT(${o.id})" title="Eliminar OT"><i class="ti ti-trash"></i></button></div></div><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;background:#f5f5f3;border-radius:3px;height:5px;overflow:hidden"><div style="height:100%;width:${pc}%;background:${pc===100?'#3b6d11':'#185fa5'};border-radius:3px"></div></div><span style="font-size:11px;color:#888">${dn}/${o.pasos.length} — ${pc}%</span></div></div>`;
  });
  return h;
}

function rPlan(){
  const tab=window._planTab||'prod';
  let h=`<div class="ph"><div><div class="pt">Planificación</div></div><button onclick="om('recursos')" style="font-size:11px"><i class="ti ti-settings"></i>Gestionar recursos</button></div>`;
  h+=`<div class="tabs"><button class="tab ${tab==='prod'?'on':''}" onclick="window._planTab='prod';render()"><i class="ti ti-printer"></i> Producción</button><button class="tab ${tab==='ent'?'on':''}" onclick="window._planTab='ent';render()"><i class="ti ti-truck-delivery"></i> Entregas / Fletes</button></div>`;

  if(tab==='prod'){
    // --- Máquinas internas ---
    h+=`<div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px"><i class="ti ti-tool" style="font-size:11px"></i> Máquinas internas</div>`;
    h+=`<div class="maq-grid">`;
    S.maquinas.forEach(m=>{
      const cnt=S.ordenes.filter(o=>Object.values(o.asignaciones||{}).some(v=>v&&v.nombre===m)).length;
      const pm=S.planificacion[m]||{};const bsem=Object.values(pm).reduce((a,d)=>a+Object.keys(d).length,0);
      let extraInfo='';
      if(m==='Pre-prensa'){
        const ppPend=S.ordenes.filter(o=>{if(o.estado==='entregada'||o.estado==='cancelada')return false;const p=o.pasos.find(x=>x.nombre==='Pre-prensa'||x.nombre==='Preprensa');return p&&p.estado!=='done';}).length;
        if(ppPend>0) extraInfo=`<div style="font-size:10px;color:#a32d2d;font-weight:600"><i class="ti ti-alert-circle" style="font-size:10px"></i> ${ppPend} pendiente${ppPend!==1?'s':''} de liberar</div>`;
        else extraInfo=`<div style="font-size:10px;color:#3b6d11"><i class="ti ti-circle-check" style="font-size:10px"></i> Todo liberado</div>`;
      }
      if(m==='Guillotina'){
        const gPend=S.ordenes.filter(o=>{if(o.estado==='entregada'||o.estado==='cancelada')return false;const p=o.pasos.find(x=>x.nombre==='Papel / Guillotina'||x.nombre==='Papel / Insumos');return p&&p.estado!=='done';}).length;
        if(gPend>0) extraInfo=`<div style="font-size:10px;color:#ba7517;font-weight:600"><i class="ti ti-cut" style="font-size:10px"></i> ${gPend} para cortar</div>`;
        else extraInfo=`<div style="font-size:10px;color:#3b6d11"><i class="ti ti-circle-check" style="font-size:10px"></i> Todo cortado</div>`;
      }
      h+=`<div class="maq-card ${planMaq===m?'on':''}" onclick="planMaq='${m.replace(/'/g,"\\'")}';planOffset=0;render()"><div style="font-size:10px;color:#888;margin-bottom:3px"><i class="ti ti-tool" style="font-size:11px"></i> Máquina</div><div style="font-size:13px;font-weight:600">${m}</div><div style="font-size:10px;color:${cnt>0?'#185fa5':'#aaa'}">${cnt} OT${cnt!==1?'s':''} asignada${cnt!==1?'s':''}</div>${extraInfo}${bsem>0?`<div style="font-size:10px;color:#3b6d11">${bsem} bloque${bsem!==1?'s':''} esta semana</div>`:''}</div>`;
    });
    h+=`</div>`;
    // --- Externos ---
    h+=`<div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;margin-top:4px"><i class="ti ti-user" style="font-size:11px"></i> Externos</div>`;
    h+=`<div class="maq-grid">`;
    S.externos.forEach(e=>{
      const pe=S.planificacion[e]||{};const bsem=Object.values(pe).reduce((a,d)=>a+Object.keys(d).length,0);
      h+=`<div class="maq-card ${planMaq===e?'on':''}" onclick="planMaq='${e.replace(/'/g,"\\'")}';planOffset=0;render()" style="border-left:3px solid #9fe1cb"><div style="font-size:10px;color:#888;margin-bottom:3px"><i class="ti ti-user" style="font-size:11px"></i> Externo</div><div style="font-size:13px;font-weight:600">${e}</div>${bsem>0?`<div style="font-size:10px;color:#3b6d11">${bsem} bloque${bsem!==1?'s':''}</div>`:''}</div>`;
    });
    h+=`</div>`;
    if(planMaq)h+=rCalSemanal(planMaq);

  } else {
    // --- ENTREGAS / FLETES ---
    h+=rEntregas();
  }
  return h;
}

// offset semanal para la vista de entregas (independiente del de máquinas)
let entOffset=0;
// flete seleccionado para ver su planilla diaria
let entFleteSel=null;

function rEntregas(){
  const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const DIAS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

  // calcular semana
  const lun=getLunes(entOffset);
  const semDias=[];
  for(let i=0;i<6;i++){const d=new Date(lun);d.setDate(lun.getDate()+i);semDias.push(d);}
  const fmtIso=d=>{const m=d.getMonth()+1,dd=d.getDate();return d.getFullYear()+'-'+String(m).padStart(2,'0')+'-'+String(dd).padStart(2,'0');}
  const fmtCorto=d=>DIAS[d.getDay()]+' '+d.getDate()+'/'+MESES[d.getMonth()];
  const isHoyD=d=>fmtIso(d)===fmtIso(new Date());

  const fleOpts=`<option value="">— Sin flete —</option>`+S.fletes.map(f=>`<option value="${f}">${f}</option>`).join('');
  const otsActivas=S.ordenes.filter(o=>o.estado!=='entregada'&&o.estado!=='cancelada');

  let h=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">`;
  h+=`<button onclick="entOffset--;render()"><i class="ti ti-chevron-left"></i></button>`;
  h+=`<strong style="font-size:13px">${semDias[0].getDate()}/${MESES[semDias[0].getMonth()]} — ${semDias[5].getDate()}/${MESES[semDias[5].getMonth()]}</strong>`;
  h+=`<button onclick="entOffset++;render()"><i class="ti ti-chevron-right"></i></button>`;
  h+=`<button onclick="entOffset=0;render()" style="font-size:11px">Hoy</button>`;
  h+=`</div>`;

  // ---- VISTA SEMANAL DE ENTREGAS ----
  h+=`<div class="cal-wrap" style="margin-bottom:16px"><table class="cal-table"><thead><tr><th class="hc">Flete</th>`;
  semDias.forEach(d=>{h+=`<th${isHoyD(d)?' style="background:#e6f1fb;color:#185fa5"':''}>${fmtCorto(d)}</th>`;});
  h+=`</tr></thead><tbody>`;

  // Fila "Sin flete" — OTs sin flete asignado
  h+=`<tr><td class="hcel" style="text-align:left;padding:4px 8px;font-size:11px;color:#aaa;font-style:italic">Sin asignar</td>`;
  semDias.forEach(d=>{
    const fecha=fmtIso(d);
    const delDia=otsActivas.filter(o=>o.entrega===fecha&&!o.fleteAsignado);
    h+=`<td style="padding:3px;vertical-align:top;min-height:32px">`;
    delDia.forEach(o=>{
      h+=`<div style="background:#f0f0ee;border-radius:5px;padding:3px 6px;margin-bottom:2px;font-size:10px;cursor:pointer" onclick="om('editEntrega',${o.id})">`;
      h+=`<div style="font-weight:600">${o.num}</div>`;
      h+=`<div style="opacity:.7;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px">${o.descripcion}</div>`;
      h+=`</div>`;
    });
    h+=`</td>`;
  });
  h+=`</tr>`;

  // Una fila por flete
  S.fletes.forEach(f=>{
    const activo=entFleteSel===f;
    h+=`<tr>`;
    h+=`<td style="padding:4px 8px;vertical-align:top;cursor:pointer;white-space:nowrap${activo?';background:#e6f1fb;font-weight:600':''}" onclick="entFleteSel=entFleteSel==='${f.replace(/'/g,"\\'")}' ? null : '${f.replace(/'/g,"\\'")}';render()">`;
    h+=`<i class="ti ti-truck-delivery" style="font-size:11px;margin-right:3px"></i>${f}`;
    const totalSem=otsActivas.filter(o=>o.fleteAsignado===f&&semDias.some(d=>fmtIso(d)===o.entrega)).length;
    if(totalSem>0)h+=`<div style="font-size:10px;color:#3b6d11;font-weight:400">${totalSem} viaje${totalSem!==1?'s':''}</div>`;
    h+=`</td>`;
    semDias.forEach(d=>{
      const fecha=fmtIso(d);
      const delDia=otsActivas.filter(o=>o.entrega===fecha&&o.fleteAsignado===f);
      const esHoy=isHoyD(d);
      h+=`<td style="padding:3px;vertical-align:top;min-height:32px${esHoy?';background:rgba(24,95,165,.04)':''}">`;
      delDia.forEach(o=>{
        h+=`<div class="${otCol(o.id)}" style="border-radius:5px;padding:3px 6px;margin-bottom:2px;font-size:10px;cursor:pointer;border:0.5px solid rgba(0,0,0,.08)" onclick="om('editEntrega',${o.id})">`;
        h+=`<div style="font-weight:600">${o.num}</div>`;
        h+=`<div style="opacity:.8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px">${cNom(o.clienteId)}</div>`;
        if(o.fleteObs)h+=`<div style="opacity:.6;font-style:italic">${o.fleteObs}</div>`;
        h+=`</div>`;
      });
      // Zona de drop vacía clickeable para asignar
      h+=`</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;

  // ---- PLANILLA DIARIA DEL FLETE SELECCIONADO ----
  if(entFleteSel){
    h+=`<div class="card">`;
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">`;
    h+=`<div style="font-size:14px;font-weight:600"><i class="ti ti-truck-delivery" style="margin-right:6px"></i>Planilla: ${entFleteSel}</div>`;
    h+=`<button onclick="entFleteSel=null;render()" style="font-size:11px"><i class="ti ti-x"></i>Cerrar</button>`;
    h+=`</div>`;
    // Tabla: filas = días de la semana, columnas = datos del viaje
    h+=`<table><thead><tr><th>Día</th><th>OT</th><th>Cliente</th><th>Descripción</th><th>Dirección entrega</th><th>Obs.</th><th>Estado</th></tr></thead><tbody>`;
    let hayViajes=false;
    semDias.forEach(d=>{
      const fecha=fmtIso(d);
      const viajes=otsActivas.filter(o=>o.entrega===fecha&&o.fleteAsignado===entFleteSel);
      if(!viajes.length)return;
      hayViajes=true;
      viajes.forEach((o,idx)=>{
        const dir=o.material?.dir||o.fichaDir||(()=>{const fi=S.fichas.find(f=>f.otId===o.id);return fi?fi.ent1Dir:'';})();
        h+=`<tr${isHoyD(d)?' style="background:#fffbf0"':''}>`;
        if(idx===0)h+=`<td rowspan="${viajes.length}" style="font-weight:600;vertical-align:top;white-space:nowrap">${fmtCorto(d)}</td>`;
        h+=`<td><strong>${o.num}</strong></td>`;
        h+=`<td>${cNom(o.clienteId)}</td>`;
        h+=`<td style="max-width:150px">${o.descripcion}</td>`;
        h+=`<td style="font-size:11px">${dir||'—'}</td>`;
        h+=`<td><input value="${o.fleteObs||''}" placeholder="Obs..." style="font-size:11px;padding:3px 7px;min-width:80px" onchange="setFleteObs(${o.id},this.value)"></td>`;
        h+=`<td>${stBadge(o.estado)}</td>`;
        h+=`</tr>`;
      });
    });
    if(!hayViajes)h+=`<tr><td colspan="7"><div class="empty" style="padding:14px"><i class="ti ti-calendar-off"></i>Sin viajes esta semana</div></td></tr>`;
    h+=`</tbody></table>`;
    h+=`</div>`;
  }

  // ---- OTs SIN FECHA ASIGNADA ----
  const sinFecha=otsActivas.filter(o=>!o.entrega);
  if(sinFecha.length){
    h+=`<div class="card" style="margin-top:4px"><div style="font-size:12px;font-weight:500;color:#888;margin-bottom:8px"><i class="ti ti-calendar-question"></i> Sin fecha de entrega (${sinFecha.length})</div>`;
    sinFecha.forEach(o=>{
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,.05)">`;
      h+=`<div><div style="font-size:12px;font-weight:500">${o.num} — ${o.descripcion}</div><div style="font-size:10px;color:#888">${cNom(o.clienteId)}</div></div>`;
      h+=`<button onclick="om('editEntrega',${o.id})" style="font-size:11px"><i class="ti ti-edit"></i>Asignar</button>`;
      h+=`</div>`;
    });
    h+=`</div>`;
  }

  return h;
}

function setFlete(otId,val){
  const o=S.ordenes.find(x=>x.id===otId);if(!o)return;
  o.fleteAsignado=val;sk('ordenes');
}
function setFleteObs(otId,val){
  const o=S.ordenes.find(x=>x.id===otId);if(!o)return;
  o.fleteObs=val;sk('ordenes');
}
function setEntregaFecha(otId,val){
  const o=S.ordenes.find(x=>x.id===otId);if(!o)return;
  o.entrega=val;sk('ordenes');cm();render();
}

// Modal para editar entrega de una OT desde la vista semanal
function mEditEntrega(id){
  const o=S.ordenes.find(x=>x.id==id);if(!o)return'';
  const fleOpts=`<option value="">— Sin flete —</option>`+S.fletes.map(f=>`<option value="${f}"${o.fleteAsignado===f?' selected':''}>${f}</option>`).join('');
  const fi=S.fichas.find(f=>f.otId===o.id);
  return `<div class="mt2"><i class="ti ti-truck-delivery" style="margin-right:6px"></i>${o.num} — Entrega</div>`
  +`<div style="background:#f5f5f3;border-radius:8px;padding:9px;margin-bottom:12px;font-size:12px"><strong>${o.descripcion}</strong><div style="color:#888;margin-top:2px">${cNom(o.clienteId)}</div>${fi?`<div style="margin-top:4px"><i class="ti ti-map-pin" style="font-size:11px"></i> ${fi.ent1Dir}</div>`:''}${fi&&fi.ent1Recibe?`<div style="font-size:11px;color:#888">Recibe: ${fi.ent1Recibe} · ${fi.ent1Tel}</div>`:''}</div>`
  +`<div class="fr"><div class="fg"><label>Fecha de entrega</label><input id="ee-fecha" type="date" value="${o.entrega||''}"></div><div class="fg"><label>Flete asignado</label><select id="ee-flete">${fleOpts}</select></div></div>`
  +`<div class="fg" style="margin-bottom:10px"><label>Observaciones</label><input id="ee-obs" value="${o.fleteObs||''}" placeholder="Ej: Llamar antes, pedir turno..."></div>`
  +`<div class="mf"><button onclick="cm()">Cancelar</button><button class="bp" onclick="saveEditEntrega(${o.id})"><i class="ti ti-check"></i>Guardar</button></div>`;
}
function saveEditEntrega(id){
  const o=S.ordenes.find(x=>x.id==id);if(!o)return;
  o.entrega=Q('ee-fecha')?.value||o.entrega;
  o.fleteAsignado=Q('ee-flete')?.value||'';
  o.fleteObs=Q('ee-obs')?.value||'';
  sk('ordenes');cm();render();
}

const SLOTS_AM=['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00'];
const SLOTS_PM=['13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30'];
const ALL_SLOTS=[...SLOTS_AM,...SLOTS_PM];
function getLunes(off){const n=new Date();const d=n.getDay();const diff=d===0?-6:1-d;const l=new Date(n);l.setDate(n.getDate()+diff+off*7);l.setHours(0,0,0,0);return l;}
function fmtD(d){if(!d)return "";if(typeof d==="string")return d.slice(0,10);return d.toISOString().slice(0,10);}
function isHoy(d){return fmtD(d)===fmtD(new Date());}

function rCalSemanal(maq){
  const lun=getLunes(planOffset);
  const dias=[];
  for(let i=0;i<6;i++){const d=new Date(lun);d.setDate(lun.getDate()+i);dias.push(d);}
  const pm=S.planificacion[maq]||{};
  const esExt=S.externos.includes(maq);
  const esFlete=S.fletes.includes(maq);
  const iconoCal=esFlete?'truck-delivery':esExt?'user':'tool';
  const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const DIAS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const otsAct=S.ordenes.filter(o=>o.estado!=='entregada'&&o.estado!=='cancelada');
  let h=`<div class="card" style="padding:12px">`;
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">`;
  h+=`<button onclick="planOffset--;render()"><i class="ti ti-chevron-left"></i></button>`;
  h+=`<strong style="font-size:13px">${dias[0].getDate()}/${MESES[dias[0].getMonth()]} — ${dias[5].getDate()}/${MESES[dias[5].getMonth()]}</strong>`;
  h+=`<button onclick="planOffset++;render()"><i class="ti ti-chevron-right"></i></button>`;
  h+=`<button onclick="planOffset=0;render()" style="font-size:11px">Hoy</button>`;
  h+=`<span style="font-size:12px;font-weight:500;color:#185fa5"><i class="ti ti-${iconoCal}" style="font-size:12px"></i> ${maq}</span>`;
  h+=`<button onclick="planMaq=null;render()" style="margin-left:auto;font-size:11px"><i class="ti ti-x"></i>Cerrar</button>`;
  h+=`</div>`;
  h+=`<div class="cal-wrap"><table class="cal-table"><thead><tr><th class="hc">Hora</th>`;
  dias.forEach(d=>{h+=`<th ${isHoy(d)?'style="background:#e6f1fb;color:#185fa5"':''}>${DIAS[d.getDay()]} ${d.getDate()}/${MESES[d.getMonth()]}</th>`;});
  h+=`</tr></thead><tbody>`;
  ALL_SLOTS.forEach(slot=>{
    h+=`<tr><td class="hcel">${slot}</td>`;
    dias.forEach(d=>{
      if(d.getDay()===0){h+=`<td class="fuer"></td>`;return;}
      if(slot==='13:00'){h+=`<td class="alm">🍽️ Almuerzo</td>`;return;}
      const fecha=fmtD(d);
      const bl=pm[fecha]&&pm[fecha][slot];
      if(bl&&!bl.cont){
        const ot=S.ordenes.find(o=>o.id===bl.otId);
        const col=ot?otCol(bl.otId):'bgr';
        const dur=bl.dur||1;
        h+=`<td style="padding:2px" rowspan="${dur}" onclick="om('editB','${maq}|${fecha}|${slot}')">`;
        h+=`<div class="bloque ${col}" style="height:${dur*26-4}px"><button class="bx" onclick="event.stopPropagation();delBloque('${maq}','${fecha}','${slot}')">×</button>`;
        h+=ot?`<div style="font-weight:600">${ot.num}</div><div style="font-size:9px;opacity:.8;overflow:hidden">${ot.descripcion.substring(0,20)}</div>`:'?';
        if(bl.pasoNombre)h+=`<div style="font-size:9px;opacity:.7;font-style:italic">${bl.pasoNombre}</div>`;
        h+=`</div></td>`;
      } else if(bl&&bl.cont){
        // skip — covered by rowspan
      } else {
        h+=`<td onclick="om('newB','${maq}|${fecha}|${slot}')"></td>`;
      }
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;

  // Panel especial para Pre-prensa: listado de trabajos pendientes
  if(maq==='Pre-prensa'){
    const isPP=o=>o.pasos.find(x=>x.nombre==='Pre-prensa'||x.nombre==='Preprensa');
    const ppPend=S.ordenes.filter(o=>{
      if(o.estado==='entregada'||o.estado==='cancelada')return false;
      const p=isPP(o);
      return p&&p.estado!=='done';
    }).sort((a,b)=>{
      const da=a.entrega?new Date(a.entrega+'T00:00:00'):new Date('9999-12-31');
      const db=b.entrega?new Date(b.entrega+'T00:00:00'):new Date('9999-12-31');
      return da-db;
    });
    const ppDone=S.ordenes.filter(o=>{
      const p=isPP(o);
      return p&&p.estado==='done'&&o.estado!=='entregada'&&o.estado!=='cancelada';
    });
    h+=`<div class="card" style="margin-top:12px">`;
    h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div style="font-size:13px;font-weight:600"><i class="ti ti-layers-subtract" style="margin-right:5px"></i>Trabajos de pre-prensa</div>`;
    h+=`<span style="background:#fcebeb;color:#a32d2d;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600">${ppPend.length} pendiente${ppPend.length!==1?'s':''}</span>`;
    h+=`<span style="background:#eaf3de;color:#3b6d11;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600">${ppDone.length} liberado${ppDone.length!==1?'s':''}</span>`;
    h+=`</div>`;
    if(!ppPend.length&&!ppDone.length){
      h+=`<div class="empty" style="padding:14px"><i class="ti ti-circle-check"></i>Todo liberado</div>`;
    } else {
      if(ppPend.length){
        h+=`<div style="font-size:11px;font-weight:700;color:#a32d2d;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Pendientes de liberar</div>`;
        h+=`<table><thead><tr><th>OT</th><th>Descripción</th><th>Cliente</th><th>Entrega</th><th>Estado paso</th><th></th></tr></thead><tbody>`;
        ppPend.forEach(o=>{
          const p=isPP(o);
          const hoy=new Date();hoy.setHours(0,0,0,0);
          const dias=o.entrega?Math.round((new Date(o.entrega+'T00:00:00')-hoy)/(1000*60*60*24)):null;
          const urgColor=dias!==null&&dias<0?'#a32d2d':dias!==null&&dias<=3?'#ba7517':'inherit';
          h+=`<tr><td><strong>${o.num}</strong></td><td style="max-width:150px">${o.descripcion}</td><td>${cNom(o.clienteId)}</td>`;
          h+=`<td style="color:${urgColor};font-size:11px;white-space:nowrap">${o.entrega||'—'}${dias!==null?`<br><span style="font-size:10px">${dias<0?Math.abs(dias)+'d atraso':dias===0?'Hoy':dias+'d'}</span>`:''}</td>`;
          h+=`<td>${p.estado==='pending'?'<span class="badge ba">Pendiente</span>':'<span class="badge bi">En curso</span>'}</td>`;
          h+=`<td style="white-space:nowrap">`;
          if(p.estado==='pending') h+=`<button class="bp" onclick="avP(${o.id},'${p.nombre}');render()" style="font-size:11px"><i class="ti ti-play"></i>Iniciar</button>`;
          if(p.estado==='active') h+=`<button class="bs" onclick="avP(${o.id},'${p.nombre}');render()" style="font-size:11px"><i class="ti ti-check"></i>Liberar</button>`;
          h+=`</td></tr>`;
        });
        h+=`</tbody></table>`;
      }
      if(ppDone.length){
        h+=`<div style="font-size:11px;font-weight:700;color:#3b6d11;text-transform:uppercase;letter-spacing:.05em;margin:10px 0 6px">Liberados (esperando impresión)</div>`;
        h+=`<div style="display:flex;flex-wrap:wrap;gap:5px">`;
        ppDone.forEach(o=>{h+=`<div class="ot-pill ${otCol(o.id)}" style="font-size:11px"><i class="ti ti-circle-check" style="font-size:10px;color:#3b6d11"></i> <strong>${o.num}</strong> ${o.descripcion.substring(0,20)}${o.descripcion.length>20?'…':''}</div>`;});
        h+=`</div>`;
      }
    }
    h+=`</div>`;
  }

  // Panel especial para Guillotina: OTs que necesitan papel cortado
  if(maq==='Guillotina'){
    const isGuill=o=>o.pasos.find(x=>x.nombre==='Papel / Guillotina'||x.nombre==='Papel / Insumos');
    const gPend=S.ordenes.filter(o=>{
      if(o.estado==='entregada'||o.estado==='cancelada')return false;
      const p=isGuill(o);
      return p&&p.estado!=='done';
    }).sort((a,b)=>{
      const da=a.entrega?new Date(a.entrega+'T00:00:00'):new Date('9999-12-31');
      const db=b.entrega?new Date(b.entrega+'T00:00:00'):new Date('9999-12-31');
      return da-db;
    });
    const gDone=S.ordenes.filter(o=>{
      const p=isGuill(o);
      return p&&p.estado==='done'&&o.estado!=='entregada'&&o.estado!=='cancelada';
    });
    h+=`<div class="card" style="margin-top:12px">`;
    h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div style="font-size:13px;font-weight:600"><i class="ti ti-cut" style="margin-right:5px"></i>Papel pendiente de llegada / corte</div>`;
    h+=`<span style="background:#fcebeb;color:#a32d2d;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600">${gPend.length} pendiente${gPend.length!==1?'s':''}</span>`;
    h+=`<span style="background:#eaf3de;color:#3b6d11;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600">${gDone.length} listo${gDone.length!==1?'s':''}</span>`;
    h+=`</div>`;
    if(!gPend.length&&!gDone.length){
      h+=`<div class="empty" style="padding:14px"><i class="ti ti-circle-check"></i>Todo cortado</div>`;
    } else {
      if(gPend.length){
        h+=`<div style="font-size:11px;font-weight:700;color:#a32d2d;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Pendiente de llegada / corte</div>`;
        h+=`<table><thead><tr><th>OT</th><th>Descripción</th><th>Cliente</th><th>Entrega</th><th>Estado</th><th></th></tr></thead><tbody>`;
        gPend.forEach(o=>{
          const p=isGuill(o);
          const hoy=new Date();hoy.setHours(0,0,0,0);
          const dias=o.entrega?Math.round((new Date(o.entrega+'T00:00:00')-hoy)/(1000*60*60*24)):null;
          const urgColor=dias!==null&&dias<0?'#a32d2d':dias!==null&&dias<=3?'#ba7517':'inherit';
          h+=`<tr><td><strong>${o.num}</strong></td><td style="max-width:150px">${o.descripcion}</td><td>${cNom(o.clienteId)}</td>`;
          h+=`<td style="color:${urgColor};font-size:11px;white-space:nowrap">${o.entrega||'—'}${dias!==null?`<br><span style="font-size:10px">${dias<0?Math.abs(dias)+'d atraso':dias===0?'Hoy':dias+'d'}</span>`:''}</td>`;
          h+=`<td>${p.estado==='pending'?'<span class="badge ba">Esperando papel</span>':'<span class="badge bi">Cortando</span>'}</td>`;
          h+=`<td style="white-space:nowrap">`;
          if(p.estado==='pending') h+=`<button class="bp" onclick="avP(${o.id},'${p.nombre}');render()" style="font-size:11px"><i class="ti ti-package"></i>Llegó papel</button>`;
          if(p.estado==='active') h+=`<button class="bs" onclick="avP(${o.id},'${p.nombre}');render()" style="font-size:11px"><i class="ti ti-check"></i>Cortado</button>`;
          h+=`</td></tr>`;
        });
        h+=`</tbody></table>`;
      }
      if(gDone.length){
        h+=`<div style="font-size:11px;font-weight:700;color:#3b6d11;text-transform:uppercase;letter-spacing:.05em;margin:10px 0 6px">Papel cortado (listo para impresión)</div>`;
        h+=`<div style="display:flex;flex-wrap:wrap;gap:5px">`;
        gDone.forEach(o=>{h+=`<div class="ot-pill ${otCol(o.id)}" style="font-size:11px"><i class="ti ti-circle-check" style="font-size:10px;color:#3b6d11"></i> <strong>${o.num}</strong> ${o.descripcion.substring(0,20)}${o.descripcion.length>20?'…':''}</div>`;});
        h+=`</div>`;
      }
    }
    h+=`</div>`;
  }

  h+=`<div style="margin-top:10px"><div style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px">OTs disponibles — click en celda vacía para asignar</div>`;
  h+=`<div style="display:flex;flex-wrap:wrap;gap:5px">`;
  otsAct.forEach(o=>{h+=`<div class="ot-pill ${otCol(o.id)}" title="${cNom(o.clienteId)} · Entrega: ${o.entrega||'—'}"><strong>${o.num}</strong> ${o.descripcion.substring(0,22)}${o.descripcion.length>22?'…':''}</div>`;});
  if(!otsAct.length)h+=`<span style="font-size:12px;color:#888">Sin OTs activas</span>`;
  h+=`</div></div></div>`;
  return h;
}

function rFicha(){
  if(fichaTab==='nueva')return rFichaNueva();
  if(fichaTab==='ver'&&fichaVerID!==null)return rFichaVer(fichaVerID);
  return rFichaLista();
}
function rFichaLista(){
  const f=bFicha.trim().toLowerCase();
  const rows=f?S.fichas.filter(x=>x.num.toLowerCase().includes(f)||(x.nPedido||'').includes(f)||x.facRazonSocial.toLowerCase().includes(f)||(x.descripcion||'').toLowerCase().includes(f)):S.fichas;
  let h=`<div class="ph"><div><div class="pt">Fichas de OT</div><div class="ps">Nota de pedido · facturación · entrega · cobranza</div></div><button class="bp" onclick="fichaTab='nueva';render()"><i class="ti ti-plus"></i>Nueva ficha</button></div>`;
  h+=`<div style="position:relative;margin-bottom:10px"><input type="text" placeholder="Buscar por nro., cliente, trabajo..." style="padding:8px 36px 8px 12px;font-size:13px;border:1.5px solid rgba(0,0,0,.2);border-radius:8px;width:100%;font-family:inherit" oninput="bFicha=this.value;render()" value="${bFicha}"><i class="ti ti-search" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#aaa;font-size:16px;pointer-events:none"></i></div>`;
  if(!rows.length){h+=`<div class="empty"><i class="ti ti-file-description"></i>${f?`Sin resultados para "${f}"`:'No hay fichas. Creá la primera.'}</div>`;return h;}
  h+=`<div style="display:flex;flex-direction:column;gap:8px">`;
  rows.slice().reverse().forEach(f=>{
    const tot=f.total*(1+f.iva);
    h+=`<div style="background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:10px;padding:12px 14px;cursor:pointer;transition:box-shadow .15s" onclick="fichaTab='ver';fichaVerID=${f.id};render()" onmouseover="this.style.boxShadow='0 2px 8px rgba(24,95,165,.12)'" onmouseout="this.style.boxShadow=''"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px"><div><div style="font-size:14px;font-weight:600">${f.num}${f.nPedido?` <span style="font-size:11px;color:#888;font-weight:400">· Pedido #${f.nPedido}</span>`:''}</div><div style="font-size:12px;color:#888;margin-top:2px">${f.facRazonSocial}</div><div style="font-size:11px;color:#aaa;margin-top:2px;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.descripcion}</div></div><div style="text-align:right"><div style="font-size:15px;font-weight:700;color:#185fa5">${$m(tot)}</div><div style="font-size:10px;color:#888">Total c/IVA</div><div style="margin-top:4px">${stBadge(f.estado)}</div></div></div><div style="display:flex;gap:14px;margin-top:7px;font-size:11px;color:#888"><span><i class="ti ti-calendar-due" style="font-size:11px"></i> Entrega: ${f.entregaSolicitada||'—'}${f.entregaAprox?' (aprox.)':''}</span><span><i class="ti ti-mail" style="font-size:11px"></i> ${f.facEmail1}</span></div></div>`;
  });
  h+=`</div>`;return h;
}

function rFichaVer(id){
  const f=S.fichas.find(x=>x.id==id);if(!f)return rFichaLista();
  const tot=f.total*(1+f.iva),iva=f.total*f.iva;
  let h=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><button onclick="fichaTab='lista';render()"><i class="ti ti-arrow-left"></i>Volver</button><div style="flex:1"><div class="pt">${f.num}${f.nPedido?` — Pedido #${f.nPedido}`:''}</div><div class="ps">${f.facRazonSocial}</div></div><button onclick="om('editFicha',${f.id})"><i class="ti ti-edit"></i>Editar</button><button class="bd" onclick="delFicha(${f.id})"><i class="ti ti-trash"></i></button></div>`;
  h+=`<div class="ficha-hdr"><div><div style="font-size:11px;opacity:.75;margin-bottom:2px">Ficha de OT</div><div style="font-size:22px;font-weight:700">${f.num}</div><div style="font-size:13px;opacity:.85;margin-top:2px">${f.facRazonSocial}</div></div><div style="text-align:right"><div style="font-size:11px;opacity:.75">Total c/IVA</div><div style="font-size:26px;font-weight:700">${$m(tot)}</div><div style="margin-top:4px">${stBadge(f.estado)}</div></div></div>`;
  h+=`<div style="background:#fff;border:0.5px solid rgba(0,0,0,.1);border-top:none;border-radius:0 0 12px 12px;padding:14px;margin-bottom:12px">`;
  // Trabajo
  h+=`<div style="margin-bottom:14px"><div class="sec-t"><i class="ti ti-clipboard-text"></i>Descripción del trabajo</div><div class="kv-grid">${kv('Fecha pedido',f.fecha)}${kv('Entrega solicitada',f.entregaSolicitada+(f.entregaAprox?' (aprox.)':''))}${f.nPedido?kv('Nro. pedido / ppto',f.nPedido):''}</div><div style="margin-top:8px;background:#f5f5f3;border-radius:7px;padding:10px;font-size:12px;line-height:1.6">${f.descripcion.replace(/\n/g,'<br>')}</div>${f.observacionesTrabajo?`<div style="margin-top:6px;font-size:11px;color:#888"><i class="ti ti-info-circle"></i> ${f.observacionesTrabajo}</div>`:''}</div>`;
  // Importes
  h+=`<div style="margin-bottom:14px"><div class="sec-t"><i class="ti ti-calculator"></i>Importes</div><div class="monto-box"><div class="monto-item"><div class="monto-label">Precio neto (AGF)</div><div class="monto-val">${$m(f.agf)}</div></div>${f.garbarinoComision>0?`<div class="monto-item"><div class="monto-label">Comisión Garbarino</div><div class="monto-val" style="color:#854d0e">${$m(f.garbarinoComision)}</div></div>`:''}${f.comisionVendedor>0?`<div class="monto-item"><div class="monto-label">Comisión vendedor${f.vendedor?' ('+f.vendedor+')':''}</div><div class="monto-val" style="color:#854d0e">${$m(f.comisionVendedor)}</div></div>`:''}<div class="monto-item"><div class="monto-label">Subtotal</div><div class="monto-val">${$m(f.total)}</div></div><div class="monto-item"><div class="monto-label">IVA (${(f.iva*100).toFixed(0)}%)</div><div class="monto-val">${$m(iva)}</div></div><div class="monto-item" style="border-left:2px solid #185fa5;padding-left:12px"><div class="monto-label">TOTAL</div><div class="monto-val" style="color:#185fa5;font-size:18px">${$m(tot)}</div></div></div></div>`;
  // Facturación
  h+=`<div style="margin-bottom:14px"><div class="sec-t"><i class="ti ti-receipt"></i>Datos de facturación</div><div class="kv-grid">${kv('Razón social',`<strong>${f.facRazonSocial}</strong>`)}${kv('CUIT',`<span style="font-family:monospace">${f.facCuit}</span>`)}${kv('Cond. IVA',f.facCondIva)}${kv('Domicilio',f.facDomicilio)}${kv('Contacto',f.facContacto)}${kv('Teléfono',f.facTelefono)}${kv('E-mail fc 1',`<a href="mailto:${f.facEmail1}">${f.facEmail1}</a>`)}${f.facEmail2?kv('E-mail fc 2',`<a href="mailto:${f.facEmail2}">${f.facEmail2}</a>`):''}${f.ordenCompra?kv('Orden de compra',`<span class="tag g">SÍ</span> ${f.nOrdenCompra}`):''}</div></div>`;
  // Cobranza
  h+=`<div style="margin-bottom:14px"><div class="sec-t"><i class="ti ti-cash"></i>Condiciones de cobranza</div><div class="kv-grid">${kv('Condición de pago',`<strong>${f.cobCondPago}</strong>`)}${kv('Forma de pago',f.cobFormaPago)}${kv('Días y horarios',f.cobDiasHorarios)}${kv('Contacto',f.cobContacto)}${kv('Teléfono',f.cobTelefono)}${kv('E-mail',`<a href="mailto:${f.cobEmail}">${f.cobEmail}</a>`)}</div>${f.cobDetalle?`<div style="margin-top:8px;background:#f5f5f3;border-radius:6px;padding:8px 10px;font-size:11px;line-height:1.6">${f.cobDetalle.replace(/\n/g,'<br>')}</div>`:''}${f.observacionesCob?`<div style="margin-top:6px;font-size:11px;color:#888"><i class="ti ti-info-circle"></i> ${f.observacionesCob}</div>`:''}</div>`;
  // Entrega 1
  h+=`<div><div class="sec-t"><i class="ti ti-truck-delivery"></i>Datos de entrega</div><div class="entrega-box"><div style="font-size:11px;font-weight:600;color:#1e40af;margin-bottom:7px">Entrega 1</div><div class="kv-grid">${kv('Dirección',f.ent1Dir)}${f.ent1Cantidad?kv('Cantidad',f.ent1Cantidad):''}${kv('Horario',f.ent1Horario)}${kv('Pedir turno',f.ent1PedirTurno?'<span class="tag a">SÍ</span>':'No')}${kv('Recibe',f.ent1Recibe)}${kv('Teléfono',f.ent1Tel)}${kv('E-mail',`<a href="mailto:${f.ent1Email}">${f.ent1Email}</a>`)}${kv('Muestras',f.ent1Muestras?`<span class="tag g">SÍ</span> ${f.ent1CantMuestras} uds.`:'No')}</div>${f.ent1Obs?`<div style="margin-top:5px;font-size:11px;color:#888">${f.ent1Obs}</div>`:''}</div>`;
  if(f.ent2Dir){h+=`<div class="entrega-box" style="margin-top:8px"><div style="font-size:11px;font-weight:600;color:#1e40af;margin-bottom:7px">Entrega 2</div><div class="kv-grid">${kv('Dirección',f.ent2Dir)}${f.ent2Cantidad?kv('Cantidad',f.ent2Cantidad):''}${kv('Horario',f.ent2Horario)}${kv('Pedir turno',f.ent2PedirTurno?'<span class="tag a">SÍ</span>':'No')}${kv('Recibe',f.ent2Recibe)}${kv('Teléfono',f.ent2Tel)}${f.ent2Email?kv('E-mail',`<a href="mailto:${f.ent2Email}">${f.ent2Email}</a>`):''}${kv('Muestras',f.ent2Muestras?`<span class="tag g">SÍ</span> ${f.ent2CantMuestras} uds.`:'No')}</div>${f.ent2Obs?`<div style="margin-top:5px;font-size:11px;color:#888">${f.ent2Obs}</div>`:''}</div>`;}
  h+=`</div></div>`;return h;
}

function rRem(){let h=`<div class="ph"><div><div class="pt">Remitos internos</div><div class="ps">${S.remitos.length} emitidos</div></div><button class="bp" onclick="om('nrem')"><i class="ti ti-plus"></i>Nuevo</button></div><div class="card" style="padding:0"><table><thead><tr><th>Nro.</th><th>Cliente</th><th>OT</th><th>Fecha</th><th>Estado</th><th></th></tr></thead><tbody>`;if(!S.remitos.length)h+=`<tr><td colspan="6"><div class="empty"><i class="ti ti-truck-delivery"></i>Sin remitos</div></td></tr>`;else S.remitos.forEach(r=>{h+=`<tr><td><strong>${r.num}</strong></td><td>${cNom(r.clienteId)}</td><td>${r.otNum||'—'}</td><td>${r.fecha}</td><td>${stBadge(r.estado)}</td><td style="white-space:nowrap"><button onclick="om('vrem',${r.id})"><i class="ti ti-eye"></i></button><button class="bd" onclick="delRem(${r.id})" title="Eliminar remito"><i class="ti ti-trash"></i></button></td></tr>`;});h+=`</tbody></table></div>`;return h;}

function rAnalOT(){

  // resumen global
  const apr=S.cotizaciones.filter(c=>c.estado==='aprobada');
  const ing=apr.reduce((a,c)=>a+(c.total||0),0);
  const cos=apr.reduce((a,c)=>a+(c.costoTotal||0),0);
  const ge=S.gastos.reduce((a,g)=>a+(g.monto||0),0);
  const ut=ing-cos-ge,mg=ing>0?((ut/ing)*100).toFixed(1):0;
  h+=`<div class="cg">
<div class="mc mi"><div class="ml">Ingresos (cots. aprobadas)</div><div class="mv">${$m(ing)}</div></div>

</div>`;
  if(!apr.length){h+=`<div class="empty"><i class="ti ti-file-invoice"></i>No hay cotizaciones aprobadas</div>`;return h;}
  h+=`<div class="card" style="padding:0;overflow:hidden">
<div style="padding:10px 14px;border-bottom:0.5px solid rgba(0,0,0,.08);font-weight:500">Por trabajo</div>

  apr.forEach(c=>{
    const ot=S.ordenes.find(o=>o.cotId==c.id);

    if(c.costos){
      // Detalle de costos expandido
      const fijos=c.costos.fijos||{};const procs=c.costos.procesos||[];
      const detItems=Object.entries({papel:'Papel',impresion:'Impresión',chapas:'Chapas',corte:'Corte',cajas:'Cajas',flete:'Flete'}).filter(([k])=>fijos[k]&&fijos[k].monto>0).map(([k,l])=>`${l}: ${$m(fijos[k].monto)}`);

function rBalAño(){
  const añoActual=new Date().getFullYear();
  const años=[...new Set(S.gastos.map(g=>g.mes?.slice(0,4)).concat(S.cotizaciones.map(c=>c.fecha?.slice(0,4))).filter(Boolean))].sort().reverse();
  if(!años.length) años.push(String(añoActual));
  let h=`<div class="ph"><div><div class="pt">Balance anual</div></div></div>`;
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><label style="font-size:12px;font-weight:500">Año:</label><select id="bal-año-inp" style="padding:5px 9px;font-size:12px;border:0.5px solid rgba(0,0,0,.25);border-radius:7px;width:auto" onchange="render()">${años.map(a=>`<option value="${a}"${a===String(añoActual)?' selected':''}>${a}</option>`).join('')}</select></div>`;

  const MESES_N=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const resumenAnual={ing:0,cos:0,gas:0};
  let tablaH=`<div class="card" style="padding:0;overflow:hidden"><table><thead><tr><th>Mes</th><th>Ingresos</th><th>Costos prod.</th><th>Gastos estr.</th><th>Resultado</th><th>Margen</th></tr></thead><tbody>`;
  for(let m=0;m<12;m++){
    const mesKey=`${año}-${String(m+1).padStart(2,'0')}`;
    const cotsM=S.cotizaciones.filter(c=>c.fecha&&c.fecha.slice(0,7)===mesKey&&c.estado==='aprobada');
    const ingM=cotsM.reduce((a,c)=>a+(c.total||0),0);

    const utM=ingM-cosM-gasM,mgM=ingM>0?((utM/ingM)*100).toFixed(1):0;

    tablaH+=`<tr${esMesAct?' style="background:#e6f1fb"':''}><td style="font-weight:${esMesAct?'600':'400'}">${MESES_N[m]}</td><td>${ingM>0?$m(ingM):'—'}</td><td>${cosM>0?$m(cosM):'—'}</td><td>${gasM>0?$m(gasM):'—'}</td><td style="color:${utM>0?'#3b6d11':utM<0?'#a32d2d':'#888'};font-weight:500">${ingM>0||gasM>0?$m(utM):'—'}</td><td style="color:${mgM>=20?'#3b6d11':mgM>=10?'#ba7517':'#a32d2d'}">${ingM>0?mgM+'%':'—'}</td></tr>`;
  }
  const utAño=resumenAnual.ing-resumenAnual.cos-resumenAnual.gas,mgAño=resumenAnual.ing>0?((utAño/resumenAnual.ing)*100).toFixed(1):0;
  tablaH+=`<tr style="background:#f5f5f3;font-weight:600"><td>TOTAL ${año}</td><td>${$m(resumenAnual.ing)}</td><td>${$m(resumenAnual.cos)}</td><td>${$m(resumenAnual.gas)}</td><td style="color:${utAño>=0?'#3b6d11':'#a32d2d'}">${$m(utAño)}</td><td style="color:${mgAño>=20?'#3b6d11':mgAño>=10?'#ba7517':'#a32d2d'}">${mgAño}%</td></tr>`;
  tablaH+=`</tbody></table></div>`;
  h+=`<div class="cg">
<div class="mc mi"><div class="ml">Ingresos ${año}</div><div class="mv">${$m(resumenAnual.ing)}</div></div>

  h+=tablaH;

function selCli(ii,hi,id,nom){Q(ii).value=nom;Q(hi).value=id;Q('dd-'+ii).classList.remove('open');}
function filtCli(ii,hi){
  const f=Q(ii).value.toLowerCase();Q(hi).value='';
  const dd=Q('dd-'+ii);dd.classList.add('open');
  const filt=f?alfa(S.clientes).filter(c=>c.nombre.toLowerCase().includes(f)||(c.cuit||'').includes(f)):alfa(S.clientes);
  if(filt.length===0){
    dd.innerHTML=`<div class="aco" style="color:#888">Sin resultados · <span style="color:#185fa5;cursor:pointer;text-decoration:underline" onmousedown="omNewCli('${ii}','${hi}')">+ Crear "${Q(ii).value}"</span></div>`;
  } else {
    dd.innerHTML=filt.map(c=>`<div class="aco" onmousedown="selCli('${ii}','${hi}',${c.id},'${c.nombre.replace(/'/g,"\\'")}')"><strong>${f?c.nombre.replace(new RegExp('('+esc(f)+')','gi'),'<mark>$1</mark>'):c.nombre}</strong>${c.cuit?`<small>${c.cuit}</small>`:''}</div>`).join('');
  }
}

// ---- HELPERS FECHA ----
function addDiasHabiles(fecha,dias){
  const d=new Date(fecha+'T00:00:00');let added=0;
  while(added<dias){d.setDate(d.getDate()+1);const dow=d.getDay();if(dow!==0&&dow!==6)added++;}
  return d.toISOString().slice(0,10);
}
// Caché del dólar BNA para no consultar en cada llamada
let _bnaDolar=null,_bnaTope=null,_bnaTs=0;
async function fetchBNADolar(){
  // Usa el proxy de exchangerate.host o dolarapi.com (ambos con CORS habilitado)
  // Intentamos dolarapi.com que devuelve cotizaciones del BCRA
  try{
    const r=await fetch('https://dolarapi.com/v1/dolares/oficial',{cache:'no-store'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    const venta=parseFloat(d.venta)||null;
    if(venta&&venta>0){_bnaDolar=Math.round(venta);_bnaTope=Math.round(venta*1.03);_bnaTs=Date.now();}
  }catch(e){
    console.warn('BNA fetch error:',e);
    // fallback: si no se puede obtener, dejamos los valores anteriores o hardcoded
    if(!_bnaDolar){_bnaDolar=1495;_bnaTope=Math.round(1495*1.03);}
  }
}
async function notasCotDefaultAsync(plazo=10){
  // Refresca si la caché tiene más de 10 minutos
  if(!_bnaDolar||Date.now()-_bnaTs>600000)await fetchBNADolar();
  const dolar=_bnaDolar||1495,tope=_bnaTope||Math.round((dolar)*1.03);
  return `IVA: Los precios no incluyen IVA 21%\n\nPlazo de entrega: ${plazo} días hábiles\n\nCondiciones de pago: con e-cheq a 30 días\n\nMantenimiento de oferta: ${plazo} días hábiles\n\nCláusula dólar: Esta cotización se realizó en base a una cotización dólar BNA venta de $${dolar.toLocaleString('es-AR')}.-\nSi la cotización del dólar supera los $${tope.toLocaleString('es-AR')}.- la presente queda sin efecto`;
}
function notasCotDefault(plazo=10){
  // versión sincrónica: usa caché si hay, o fallback hardcoded
  const dolar=_bnaDolar||1495,tope=_bnaTope||Math.round((dolar)*1.03);

}

function om(t,id){
  cm();

    nc:mNC,vc:()=>mVC(id),np:mNP,vp:()=>mVP(id),
    nc2:()=>{initCostos();return mNC2();},vc2:()=>mVC2(id),

    ngas:mNGAS,
    editFicha:()=>mEditFicha(id),
    newB:()=>mNewBloque(id),editB:()=>mEditBloque(id)
  };
  const fn=mods[t];if(!fn)return;
  const h=fn();if(!h)return;
  const ov=document.createElement('div');ov.className='ov';ov.id='ov';

}

function updMargen(){
  const vEl=Q('cot-venta-d'),cEl=Q('costos-total');

function kv2(label,val){if(val===undefined||val===null||val==='')return'';return `<div class="kv"><span class="kk">${label}</span><span class="kval">${val}</span></div>`;}

function mVOT(id){
  const o=S.ordenes.find(x=>x.id==id);if(!o)return'';
  let h=`<div class="mt2">${o.num} ${stBadge(o.estado)}</div>`;
  h+=`<div class="kv"><span class="kk">Cliente</span><span class="kval">${cNom(o.clienteId)}</span></div>`;
  h+=kv2('Vendedor',o.vendedor);
  h+=kv2('OT controlada por',o.controladaPor);
  h+=`<div class="kv"><span class="kk">Fecha ingreso</span><span class="kval">${o.fecha||'—'}</span></div>`;
  h+=`<div class="kv"><span class="kk">Fecha entrega</span><span class="kval">${o.entrega||'—'}</span></div>`;
  h+=`<div style="margin-top:8px;background:#f5f5f3;border-radius:7px;padding:9px;font-size:12px;line-height:1.5">${o.descripcion||'—'}</div>`;

  // Material
  if(o.material&&(o.material.material||o.material.grs||o.material.pliegos)){
    const m=o.material;
    h+=sec2('Material a cortar','cut');
    h+=`<div class="kv-grid">${kv2('Proveedor',pNom(parseInt(m.prov))||m.prov)}${kv2('Papelera',m.papelera)}${kv2('Material',m.material)}${kv2('Formato',m.fx&&m.fy?`${m.fx} x ${m.fy} cm`:'')}${kv2('Gramaje',m.grs?m.grs+' grs':'')}${kv2('Hojas',m.hojas)}${kv2('Kg',m.kg)}${kv2('Cortar a',m.cax&&m.cay?`${m.cax} x ${m.cay} cm`:'')}${kv2('Poses',m.poses)}${kv2('Total pliegos',m.pliegos)}</div>`;
    if(m.aclaracion)h+=`<div style="margin-top:5px;font-size:11px;color:#a32d2d"><i class="ti ti-alert-triangle"></i> ${m.aclaracion}</div>`;
  }
  // Impresion
  if(o.impresion&&(o.impresion.maquina||o.impresion.piezas)){
    const im=o.impresion;
    h+=sec2('Impresión','printer');
    h+=`<div class="kv-grid">${kv2('Máquina',im.maquina)}${kv2('Maquinista',im.maquinista)}${kv2('Colores',im.colores)}${kv2('Chapas',im.chapas)}${kv2('Frente',im.frente)}${kv2('Dorso',im.dorso)}${kv2('Piezas',im.piezas)}${kv2('Posturas',im.posturas)}${kv2('Pliegos cortados',im.pliegosCortados)}${kv2('Pliegos buenos',im.pliegosBuenos)}${kv2('Pliegos demasía',im.pliegosDemasia)}${kv2('Desperdicio',im.desperdicio)}</div>`;
    if(im.obs)h+=`<div style="margin-top:5px;font-size:11px;color:#888"><i class="ti ti-info-circle"></i> ${im.obs}</div>`;
  }
  // Terminacion
  if(o.terminacion&&o.terminacion.length){
    h+=sec2('Procesos de terminación','stack-2');
    if(o.ordenProcesos)h+=`<div style="font-size:11px;color:#a32d2d;margin-bottom:6px"><i class="ti ti-list-numbers"></i> ${o.ordenProcesos}</div>`;
    h+=`<div style="display:flex;flex-direction:column;gap:3px">`;
    o.terminacion.forEach(t=>{h+=`<div style="display:flex;justify-content:space-between;align-items:center;background:#f5f5f3;border-radius:6px;padding:5px 9px;font-size:12px"><span><span class="tag g">SÍ</span> <strong>${t.nombre}</strong>${t.detalle?` — ${t.detalle}`:''}</span>${t.provId?`<span style="font-size:10px;color:#888">${pNom(parseInt(t.provId))}</span>`:''}</div>`;});
    h+=`</div>`;
  }
  // Empaque
  if(o.empaque&&(o.empaque.paq||o.empaque.caja||o.empaque.obs)){
    h+=sec2('Empaque','package');
    h+=`<div class="kv-grid">${kv2('Paquetes de',o.empaque.paq)}${kv2('Cajas de',o.empaque.caja)}</div>`;
    if(o.empaque.obs)h+=`<div style="margin-top:5px;font-size:11px;color:#888">${o.empaque.obs}</div>`;
  }

  // Seguimiento de pasos
  h+=sec2('Seguimiento de producción','list-check');
  h+=`<div style="margin-bottom:4px">`;
  o.pasos.forEach((p,i)=>{
    const a=o.asignaciones&&o.asignaciones[p.nombre];
    h+=`<div style="display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid rgba(0,0,0,.05)"><div class="sdot ${p.estado}" style="margin-top:1px">${p.estado==='done'?'<i class="ti ti-check" style="font-size:9px"></i>':p.estado==='active'?'▶':(i+1)}</div><div style="flex:1"><div style="font-size:12px;font-weight:500">${p.nombre}${p.fecha?` <span style="font-weight:400;color:#888">${p.fecha}</span>`:''} ${a&&a.nombre?`<span class="rtag ${a.tipo==='maq'?'maq':a.tipo==='fle'?'ext':'ext'}" style="font-size:10px"><i class="ti ti-${a.tipo==='maq'?'tool':a.tipo==='fle'?'truck-delivery':'user'}" style="font-size:9px"></i>${a.nombre}</span>`:''}</div>${p.nota?`<div style="font-size:11px;color:#888">${p.nota}</div>`:''}${p.estado!=='done'?`<div style="margin-top:4px;display:flex;gap:4px"><input id="np${i}" placeholder="Nota..." style="font-size:11px;padding:3px 7px"><button class="bs" onclick="avPN(${o.id},${i})"><i class="ti ti-check"></i>${p.estado==='pending'?'Iniciar':'Completar'}</button></div>`:''}</div></div>`;
  });
  h+=`</div>`;
  h+=`<div class="mf"><button onclick="cm()">Cerrar</button><button onclick="om('editOT',${id})"><i class="ti ti-edit"></i>Editar detalle</button><button onclick="om('asgn',${id})"><i class="ti ti-cpu"></i>Asignar recursos</button>${o.estado!=='entregada'?`<button class="bp" onclick="om('nrem');cm()"><i class="ti ti-truck-delivery"></i>Remito</button>`:''}</div>`;
  return h;
}

function mASGN(otId){
  const o=S.ordenes.find(x=>x.id===otId);if(!o)return'';
  if(!o.asignaciones)o.asignaciones={};
  const maqOpts=`<option value="">— Sin asignar —</option>${S.maquinas.map(m=>`<option value="maq::${m}">🔧 ${m}</option>`).join('')}<option disabled>──────────</option>${S.externos.map(e=>`<option value="ext::${e}">👤 ${e}</option>`).join('')}<option disabled>──────────</option>${S.fletes.map(f=>`<option value="fle::${f}">🚚 ${f}</option>`).join('')}`;
  let h=`<div class="mt2"><i class="ti ti-cpu" style="margin-right:6px"></i>Asignar recursos — ${o.num}</div><div style="font-size:12px;color:#888;margin-bottom:12px">${o.descripcion}</div>`;
  o.pasos.forEach((p,i)=>{const cur=o.asignaciones[p.nombre];const curVal=cur?(cur.tipo+'::'+cur.nombre):'';h+=`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid rgba(0,0,0,.05)"><div class="sdot ${p.estado}" style="flex-shrink:0">${p.estado==='done'?'<i class="ti ti-check" style="font-size:9px"></i>':p.estado==='active'?'▶':(i+1)}</div><div style="flex:1"><div style="font-size:12px;font-weight:500">${p.nombre}</div>${cur&&cur.nombre?`<div style="font-size:10px;color:#888">→ ${cur.nombre}</div>`:''}</div><select style="font-size:11px;padding:4px 7px;width:auto;min-width:140px" onchange="setAsign(${otId},'${p.nombre}',this.value)">${maqOpts.replace(`value="${curVal}"`,`value="${curVal}" selected`)}</select></div>`;});
  h+=`<div style="background:#f5f5f3;border-radius:8px;padding:10px;margin:10px 0"><div style="font-size:11px;font-weight:600;color:#666;margin-bottom:7px">Asignación rápida (a todos los pasos)</div><div style="display:flex;gap:7px"><select id="asgn-rapida" style="font-size:12px;padding:5px 9px;flex:1"><option value="">Seleccionar...</option>${S.maquinas.map(m=>`<option value="maq::${m}">🔧 ${m}</option>`).join('')}<option disabled>──────────</option>${S.externos.map(e=>`<option value="ext::${e}">👤 ${e}</option>`).join('')}<option disabled>──────────</option>${S.fletes.map(f=>`<option value="fle::${f}">🚚 ${f}</option>`).join('')}</select><button class="bp" onclick="asignRapida(${otId})" style="white-space:nowrap"><i class="ti ti-bolt"></i>Aplicar a todos</button></div></div>`;
  h+=`<div class="mf"><button onclick="cm();render()">Cerrar</button></div>`;return h;
}
function setAsign(otId,paso,val){const o=S.ordenes.find(x=>x.id===otId);if(!o)return;if(!o.asignaciones)o.asignaciones={};if(!val){delete o.asignaciones[paso];}else{const[tipo,...rest]=val.split('::');o.asignaciones[paso]={tipo,nombre:rest.join('::')};};sk('ordenes');const mod=document.querySelector('.mod');if(mod)mod.innerHTML=mASGN(otId);}
function asignRapida(otId){const val=Q('asgn-rapida')?.value;if(!val)return;const o=S.ordenes.find(x=>x.id===otId);if(!o)return;if(!o.asignaciones)o.asignaciones={};const[tipo,...rest]=val.split('::');o.pasos.forEach(p=>{o.asignaciones[p.nombre]={tipo,nombre:rest.join('::')};});sk('ordenes');const mod=document.querySelector('.mod');if(mod)mod.innerHTML=mASGN(otId);}

function addRec(tipo){
  const inp=Q('new-'+tipo);if(!inp)return;
  const val=inp.value.trim();if(!val)return;
  if(tipo==='maq'){if(!S.maquinas.includes(val))S.maquinas.push(val);sk('maquinas');}
  else if(tipo==='ext'){if(!S.externos.includes(val))S.externos.push(val);sk('externos');}
  else if(tipo==='fle'){if(!S.fletes.includes(val))S.fletes.push(val);sk('fletes');}
  inp.value='';
  const mod=document.querySelector('.mod');if(mod)mod.innerHTML=mRecursos();
}
function delRec(tipo,idx){
  if(tipo==='maq'){S.maquinas.splice(idx,1);sk('maquinas');}
  else if(tipo==='ext'){S.externos.splice(idx,1);sk('externos');}
  else if(tipo==='fle'){S.fletes.splice(idx,1);sk('fletes');}
  const mod=document.querySelector('.mod');if(mod)mod.innerHTML=mRecursos();
}

function mEditBloque(data){
  const[maq,fecha,slot]=data.split('|');

  const b=S.planificacion[maq][fecha][slot];const ot=S.ordenes.find(o=>o.id===b.otId);
  const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];const DIAS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const d=new Date(fecha+'T12:00:00');
  return `<div class="mt2"><i class="ti ti-calendar-event" style="margin-right:6px"></i>Bloque planificado</div>
<div style="background:#f5f5f3;border-radius:8px;padding:9px;margin-bottom:12px">

<div class="kv"><span class="kk">Hora</span><span class="kval">${slot}</span></div>
${ot?`<div class="kv"><span class="kk">OT</span><span class="kval"><span class="badge ${otCol(ot.id)}">${ot.num}</span> ${ot.descripcion}</span></div>`:''}
${b.pasoNombre?`<div class="kv"><span class="kk">Paso</span><span class="kval">${b.pasoNombre}</span></div>`:''}

function savBloque(data){
  const[maq,fecha,slot]=data.split('|');
  const otId=parseInt(Q('b-ot')?.value);if(!otId){alert('Seleccioná una OT');return;}
  const pasoNombre=Q('b-paso')?.value||'',dur=parseInt(Q('b-dur')?.value)||1,nota=Q('b-nota')?.value||'';
  if(!S.planificacion[maq])S.planificacion[maq]={};
  if(!S.planificacion[maq][fecha])S.planificacion[maq][fecha]={};
  const idx=ALL_SLOTS.indexOf(slot);
  for(let i=0;i<dur&&(idx+i)<ALL_SLOTS.length;i++){
    if(!S.planificacion[maq][fecha])S.planificacion[maq][fecha]={};
    S.planificacion[maq][fecha][ALL_SLOTS[idx+i]]={otId,pasoNombre,nota,dur:i===0?dur:0,cont:i>0};
  }
  sk('planificacion');cm();render();
}
function delBloque(maq,fecha,slot){
  if(!S.planificacion[maq]||!S.planificacion[maq][fecha])return;
  const b=S.planificacion[maq][fecha][slot];if(!b)return;
  if(b.dur>1){const idx=ALL_SLOTS.indexOf(slot);for(let i=0;i<b.dur&&(idx+i)<ALL_SLOTS.length;i++)delete S.planificacion[maq][fecha][ALL_SLOTS[idx+i]];}
  else delete S.planificacion[maq][fecha][slot];
  if(Object.keys(S.planificacion[maq][fecha]).length===0)delete S.planificacion[maq][fecha];
  sk('planificacion');render();
}

  h+=`</tbody></table><div style="padding:7px;text-align:right;font-size:11px;background:#f5f5f3">Sub: ${$m(c.subtotal)} · IVA: ${$m(c.iva)} · <strong>Total: ${$m(c.total)}</strong></div></div>`;
  if(c.costos){
    h+=`<div style="background:#f5f5f3;border-radius:7px;padding:9px;font-size:12px;margin-bottom:10px"><div style="font-weight:600;margin-bottom:6px">Costos</div>`;
    const labels={papel:'Papel',impresion:'Impresión',chapas:'Chapas',corte:'Corte',cajas:'Cajas',flete:'Flete'};
    if(c.costos.fijos){Object.entries(labels).forEach(([k,l])=>{const d=c.costos.fijos[k];if(d&&d.monto>0)h+='<div class="kv"><span class="kk">'+l+'</span><span class="kval"><strong>'+$m(d.monto)+'</strong>'+(d.provId?' — '+pNom(parseInt(d.provId)):'')+'</span></div>';});}
    (c.costos.procesos||[]).forEach(p=>{h+='<div class="kv"><span class="kk">'+escH(p.nombre)+'</span><span class="kval"><strong>'+$m(p.monto)+'</strong>'+(p.provId?' — '+pNom(parseInt(p.provId)):'')+'</span></div>';});
    h+=`<div style="display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid rgba(0,0,0,.1);font-weight:600"><span>Costo total</span><span>${$m(ct)}</span></div></div>`;
  }
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#e6f1fb;border-radius:8px;margin-bottom:10px"><span>Venta: <strong>${$m(c.total)}</strong></span><span>Costo: <strong>${$m(ct)}</strong></span><span style="font-size:16px;font-weight:700;color:${mg>=20?'#3b6d11':mg>=10?'#ba7517':'#a32d2d'}">Margen: ${mg}%</span></div>`;
  if(ot)h+=`<div class="alert as"><i class="ti ti-clipboard-check"></i>OT: <strong>${ot.num}</strong> ${stBadge(ot.estado)}</div>`;
  h+=`<div class="mf"><button onclick="cm()">Cerrar</button><button onclick="generarPDFCotizacion(${c.id})"><i class="ti ti-printer"></i>PDF</button>`;
  if(c.estado==='borrador'||c.estado==='enviada')h+=`<button class="bs" onclick="chCot(${c.id},'aprobada')"><i class="ti ti-check"></i>Aprobar</button>`;
  if(c.estado==='aprobada'&&!ot)h+=`<button class="bp" onclick="genOT(${c.id});cm()"><i class="ti ti-clipboard-plus"></i>Generar OT</button>`;
  h+=`</div>`;
  const ov=document.createElement('div');ov.className='ov';ov.id='ov';
  const inner=document.createElement('div');inner.className='mod';inner.innerHTML=h;
  ov.appendChild(inner);ov.addEventListener('click',e=>{if(e.target===ov)cm();});
  document.body.appendChild(ov);
}
function delOT(id){const o=S.ordenes.find(x=>x.id==id);if(!o)return;if(!confirm(`¿Eliminar la OT ${o.num}?\nEsta acción no se puede deshacer.`))return;S.ordenes=S.ordenes.filter(x=>x.id!=id);sk('ordenes');render();}
function delRem(id){const r=S.remitos.find(x=>x.id==id);if(!r)return;if(!confirm(`¿Eliminar el remito ${r.num}?\nEsta acción no se puede deshacer.`))return;S.remitos=S.remitos.filter(x=>x.id!=id);sk('remitos');render();}

init();
// Pre-cargar cotización del dólar BNA al iniciar
fetchBNADolar().catch(()=>{});
</script>
</body>
